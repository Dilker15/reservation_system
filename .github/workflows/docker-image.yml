  build-image-upload:
      runs-on: ubuntu-latest
    #  needs: testing
      if: always()

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: configure AWS credentials
          uses : aws-actions/configure-aws-credentials@v4
          with:
              aws-access-key-id: ${{  secrets.AWS_ACCESS_KEY }}
              aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
              aws-region: ${{ vars.AWS_REGION }}
          
        - name: Log in to Amazon ECR
          id: id-login-ecr
          uses: aws-actions/amazon-ecr-login@v2


        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Extract metadata Docker
          id: id-meta
          uses: docker/metadata-action@v5
          with:
            images: |
                    ${{ secrets.DOCKER_USER }}/${{ env.repo-name }}
                    ${{ steps.id-login-ecr.outputs.registry }}/${{ env.repo-name }}
            tags: |
              type=raw,value=latest
              type=sha

        
        - name: Get ECR Image URI
          id: image
          run: |
              SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)
              echo "image=${{ steps.id-login-ecr.outputs.registry }}/${{ env.repo-name }}:sha-$SHORT_SHA" >> $GITHUB_OUTPUT
            
        - name: Set Timestamp
          id: id-time
          run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT


        - name: Build / Push to Docker and ECR
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{ steps.id-meta.outputs.tags }}
            cache-from: type=gha
            cache-to: type=gha,mode=max


        - name: Download task definition ecs
          env:
            TASK_DEFINITION_FAMILY: ${{env.repo-name}}-task-definition-family
          run: |
                aws ecs describe-task-definition --task-definition ${{ env.TASK_DEFINITION_FAMILY }} --query taskDefinition > task-definition.json
    
          

        - name: Replace image ID in TaskDefintion downloaded from ECS
          id: id-task-def
          uses: aws-actions/amazon-ecs-render-task-definition@v1
          with:
              task-definition: task-definition.json
              container-name: ${{env.repo-name}}-container
              image: ${{ steps.image.outputs.image }}
              environment-variables: |
                    DEPLOYED_TOKEN=${{ github.sha }}
                    DEPLOYED_AT=${{ steps.id-time.outputs.date }}


        - name: Deploy task definition updated and update Service
          uses: aws-actions/amazon-ecs-deploy-task-definition@v2
          with:
            task-definition: ${{ steps.id-task-def.outputs.task-definition }}
            service: ${{env.repo-name}}-service
            cluster: ${{ env.repo-name }}
            wait-for-service-stability: true

      
    

        


