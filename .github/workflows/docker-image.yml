# (testing + build image + push a Docker Hub + ECR + deploy en ECS).

name: Deployment Pipeline

on: 
   push:
      branches: [testing-pipeline]


  
jobs:
  testing:
    strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest]
          node: [20]
    runs-on: ${{matrix.os}}
    steps:
        - name: Get Code
          uses: actions/checkout@v4

        - name: Install Node
          uses: actions/setup-node@v4
          with:
            node-version: ${{matrix.node}}
            cache: 'npm'  # cache data

        - name: Install Dependencies
          run: npm ci

        - name: Run Testing
          id: id-testing
          run : npm run test:cov

        - name: Set Timestamp
          id: id-time
          if: failure() && steps.id-testing.outcome == 'failure'
          run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

        - name: Upload HTML Coverage if Fail
          if: failure() && steps.id-testing.outcome == 'failure'
          uses: actions/upload-artifact@v4
          with:
             name: coverage-report-${{ steps.id-time.outputs.date }}
             path: coverage/lcov-report/

  build-image-upload:
      runs-on: ubuntu-latest
      needs: testing
      if: failure()
      steps:
        - name: building image and uploading test
          run : echo "Docker was build and uploaded successfully"



    
            
    

        


