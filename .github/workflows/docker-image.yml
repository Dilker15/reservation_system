# (testing + build image + push a Docker Hub + ECR + deploy en ECS).

name: Deployment Pipeline

on: 
   push:
      branches: [testing-pipeline]


  
jobs:
  testing:
    outputs:
       date: ${{steps.id-time.outputs.date}}
    strategy:
        fail-fast: false
        matrix:
          os: [ubuntu-latest]
          node: [20]
    runs-on: ${{matrix.os}}
    steps:
        - name: Get Code
          uses: actions/checkout@v4

        - name: Install Node
          uses: actions/setup-node@v4
          with:
            node-version: ${{matrix.node}}
            cache: 'npm'  # cache data

        - name: Install Dependencies
          run: npm ci

        - name: Run Testing
          id: id-testing
          run : npm run test:cov

        - name: Set Timestamp
          id: id-time
          if: failure() && steps.id-testing.outcome == 'failure'
          run: echo "date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

        - name: Upload HTML Coverage if Fail
          if: failure() && steps.id-testing.outcome == 'failure'
          uses: actions/upload-artifact@v4
          with:
             name: coverage-report-${{ steps.id-time.outputs.date }}
             path: coverage/lcov-report/

  build-image-upload:
      runs-on: ubuntu-latest
      needs: testing
      if: failure()

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USER }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        - name: Extract metadata
          id: meta
          uses: docker/metadata-action@v5
          with:
            images: ${{ secrets.DOCKER_USER }}/reservation-api
            tags: |
              type=raw,value=latest
              type=sha
              type=ref,event=branch
              type=ref,event=pr

        - name: Build and Push
          uses: docker/build-push-action@v5
          with:
            context: .
            push: true
            tags: ${{ steps.meta.outputs.tags }}
            cache-from: type=gha
            cache-to: type=gha,mode=max



    
            
    

        


